name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Test against the minimum supported and the latest stable.
        # Add 3.14 when it ships.
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Pin Python ${{ matrix.python-version }}
        run: uv python pin ${{ matrix.python-version }}

      - name: Install deps
        run: uv sync --all-extras --dev

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format
        run: uv run ruff format --check .

      - name: Mypy strict
        run: uv run mypy src tests

      - name: Pytest
        run: uv run pytest -v

      - name: CLI smoke
        run: |
          uv run prompteval --version
          uv run prompteval hello
